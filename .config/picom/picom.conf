###     Shadows     ###
shadow = true;
shadow-radius6= 16;

# needed for blur
backend = "glx";

### Rounded Corners ###
corner-radius = 16.0;
round-borders = 1;

###      Blur       ###
blur: 
{
    method = "dual_kawase";
    strength = 8;
    background = false;
    background-frame = false;
    background-fixed = false;
};
